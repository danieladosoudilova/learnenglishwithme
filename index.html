<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">

  <title>Mum is learning English</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FBF7F4">

  <!-- iOS / Safari standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="English">
  <link rel="apple-touch-icon" href="app%20icon.png">
  <link rel="icon" href="app%20icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- App bar -->
    <header class="appbar">
      <button id="backBtn" class="appbar__back" aria-label="Back" hidden>
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 id="appbarTitle" class="appbar__title">Vocabulary</h1>
      <div class="appbar__spacer" aria-hidden="true"></div>
    </header>

    <!-- Scrollable content -->
    <main id="screen" class="screen">
      <!-- screens are rendered here by script.js -->
      <div class="loading">Loading…</div>
    </main>

    <!-- Bottom tab bar -->
    <nav class="tabbar" role="tablist" aria-label="Sections">
      <button class="tab is-active" data-tab="vocab" role="tab" aria-selected="true">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v15H5.5A1.5 1.5 0 0 0 4 20.5V5.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v15h5.5A1.5 1.5 0 0 1 20 20.5V5.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
        <span>Vocabulary</span>
      </button>
      <button class="tab" data-tab="grammar" role="tab" aria-selected="false">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M8 10h8M8 14h8M8 17h5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span>Grammar</span>
      </button>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
